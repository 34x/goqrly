<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup TOTP - goqrly</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .instructions { color: #666; margin-bottom: 20px; font-size: 14px; }
        .qr { margin: 20px auto; padding: 20px; background: #fafafa; border-radius: 8px; display: inline-block; }
        .qr img { display: block; }
        .secret { margin: 15px 0; padding: 10px; background: #f0f0f0; border-radius: 4px; font-family: monospace; font-size: 14px; letter-spacing: 2px; word-break: break-all; }
        form { margin-top: 30px; }
        input, textarea { width: 100%; padding: 12px; font-size: 16px; box-sizing: border-box; font-family: inherit; }
        .code-input { text-align: center; }
        .code-input input { width: 150px; letter-spacing: 4px; text-align: center; }
        button { width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: #dc3545; margin: 10px 0; font-size: 14px; }
        .back { margin-top: 20px; }
        .back a { color: #666; text-decoration: none; font-size: 14px; }
        .back a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Setup TOTP</h1>
    <p class="instructions">Scan this QR with your authenticator app, then enter the code to verify.</p>
    
    <div class="qr">
        <img src="data:image/png;base64,{{.SecretQR}}" alt="TOTP QR Code">
    </div>
    
    <p class="secret">{{.Secret}}</p>
    
    {{if .WrongCode}}
    <p class="error">Invalid code. Please try again.</p>
    {{end}}
    
    <form action="/setup-totp" method="POST">
        <input type="hidden" name="secret" value="{{.Secret}}">
        <input type="hidden" name="text" value="{{.Text}}">
        
        <div class="code-input">
            <input type="text" name="code" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required autofocus>
        </div>
        
        <button type="submit">Verify & Create</button>
    </form>
    
    <div class="back">
        <a href="/">Cancel</a>
    </div>
</body>
</html>

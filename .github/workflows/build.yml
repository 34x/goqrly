name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o goqrly .
          ./goqrly --help

      - name: Quick test
        run: |
          ./goqrly &
          sleep 1
          curl -s http://localhost:8080/ | grep -q goqrly
          pkill -f goqrly

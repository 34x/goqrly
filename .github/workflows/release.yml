name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build ${{ matrix.arch }}
        run: |
          NAME="goqrly_linux_${{ matrix.arch }}"
          CGO_ENABLED=0 GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o "$NAME" .
          tar -czf "${NAME}.tar.gz" "$NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goqrly_${{ matrix.arch }}
          path: goqrly_linux_${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    # Source - https://stackoverflow.com/a/76523728
    # Posted by Skenvy, modified by community. See post 'Timeline' for change history
    # Retrieved 2026-03-21, License - CC BY-SA 4.0
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} artifacts/*.tar.gz --title "goqrly ${{ github.ref_name }}" --generate-notes
